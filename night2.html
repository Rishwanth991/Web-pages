<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color:lightsalmon;text-align:center;"></body>

    <form>
        <div>
            <h2><b><i>Student Registration form</i></b></h2>
            <label><i>Username</i></label>
            <input type="text "name="username" placeholder="Enter your username" required><br><br>
            <label><i>Password</i></label>
            <input type="password" name="password" placeholder="Enter your password" required><br><br>
            <label><i>Email</i></label>
            <input type="email" name="email" placeholder="enter your mail id"required><br><br>
            <label><i>Upload your resume</i></label>
            <input type="file"name="resume" required><br><br>
            <label><i>Date of Birth</i></label>
            <input type="date" name="dob" placeholder='D-O-B'required><br><br>
            <label>Gender</label>
            <input type="radio" name="Gender" value="Male">Male
            <input type="radio" name="Gender" value="Female">Female
            <br><br>
            <label><i>Hobbies</i></label>
            <input type="checkbox" name="hobbies" value="cricket">Cricket
            <input type="checkbox" name="hobbies" value="football">Football
            <input type="checkbox" name="hobbies" value="NO TALENT">Nak em ravu
            <br><br>
            <label><i>Phone number</i></label>
            <input type="tel" name='phone' placeholder="Enter phno" required><br><br>
            <label>Course</label>
            <input type="text" name="course" placeholder="Ex:bsc, bcom, btech" required><br><br>
        </div>
    </form>
</body>
</html>
