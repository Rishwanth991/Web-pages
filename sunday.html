<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
</head></body>
<body style="background-color:lime;">
    <form name="manoja">
        <p style="text-align:left">
            <label>ENTER YOUR FIRST INPUT</label><br>
            <input type="text"name="fname"/><br/><br>
            <label>ENTER YOUR SECOND INPUT</label><br>
            <input type="text"name="sename"/></br><br>
            <input type="button" value="addition" onclick="add()"/><br><br>
            <input type="button"value="subtraction"onclick="sub()"/><br><br>
            <input type="button"value="multiplication"onclick="mul()"/><br><br>
            <input type="button"value="clear_form"onclick="reset()"/><br><br>
        </p>
    </form>
</hr>
   <h1 id="cluk"style="text-align:right;color:brown"></h1>
   <script type="text/javascript">
    function add()
    {
    var x=parseInt(manoja.fname.value);
    var y=parseInt(manoja.sename.value);
    var sum = x + y;
        document.getElementById("cluk").innerHTML="{SUM OF TWO}=  "+sum;
    }
    function sub()
    {
        var x=parseInt(manoja.fname.value);
        var y=parseInt(manoja.sename.value);
        var diff=x-y;
        document.getElementById("cluk").innerHTML="{DIFFERENCE OF TWO NUMBER}= "+diff;
    }
    function mul()
    {
        var x=parseInt(manoja.fname.value);
        var y=parseInt(manoja.sename.value);
        var mul=x*y;
        document.getElementById("cluk").innerHTML="{PRODUCT OF TWO NUMBERS}= "+mul;
    }
    function reset()
    {
        document.getElementById("cluk").innerHTML=" ";
        }
   </script>
</body>
</html>
