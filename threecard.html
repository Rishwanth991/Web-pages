    <script type="text/javascript">
        
function prime()
{
    let x = parseInt(frm1.txtValue1.value);

    let isprime = true;

    if(x <= 1)
    {
        isprime = false;
    }
    else
    {
        for(let i = 2; i < x; i++)
        {
            if(x % i == 0)
            {
                isprime = false;
                break;
            }
        }
    }

    let result = isprime
        ? x + " is a prime number"
        : x + " is not a prime number";

    document.getElementById("resinfo").innerHTML = result;
}
function reverse()
{
  let x= parseInt(frm2.txtValue2.value);
  let rev=0;
  while(x > 0)
  {
    let rem = x % 10;
    rev = rev * 10 + rem;
    x = Math.floor(x / 10);
  }
  document.getElementById("resinfoo").innerHTML ="Reverse of=" + frm2.txtValue2.value + " is " + rev;

}
function factorial()
{
  let x= parseInt(frm3.txtValue3.value);
  let fact=1;
  for(let i=1; i<=x; i++)
  {
    fact *= i;
  }
  document.getElementById("resinfos").innerHTML ="Factorial of "+ frm3.txtValue3.value + " is " + fact;
  //document.getElementById("resinfos").innerHTML ="Factorial of " + frm3.txtValue3.value + " is " + fact;
}
function evenodd()
{
  let x= parseInt(frm4.txtValue4.value);
  let result = (x % 2 == 0)
    ? x + " is an even number"
    : x + " is an odd number";
  document.getElementById("resinfosd").innerHTML = result;
}
function clearinfo()
{
    document.getElementById("resinfoc").innerHTML="";
    document.getElementById("resinfo").innerHTML="";
    document.getElementById("resinfoo").innerHTML="";
    document.getElementById("resinfos").innerHTML="";
    document.getElementById("resinfosd").innerHTML="";
    frm1.txtValue1.value="";
    frm2.txtValue2.value="";
    frm3.txtValue3.value="";
    frm4.txtValue4.value="";

}
