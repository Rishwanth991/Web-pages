<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
}

.container{
    position:relative;
    width:380px;
    padding:3px;
    border-radius:15px;
    overflow:hidden;
}

.container::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:conic-gradient(
        transparent,
        #00ffff,
        #ff00ff,
        #00ffff
    );
    animation:rotate 4s linear infinite;
    top:-100px;
    left:-100px;
}

.container form{
    position:relative;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    z-index:1;
}

@keyframes rotate{
    100%{
        transform:rotate(360deg);
    }
}

h2{
    color:white;
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    margin:12px 0;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00ffff;
    color:black;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00ffff;
}
</style>
</head>

<body>

<div class="container">
    <form>
        <h2>Registration Form</h2>

        <div class="input-box">
            <input type="text" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <input type="tel" placeholder="Mobile Number" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Confirm Password" required>
        </div>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
