    <div class="container-fluid"> 
        <div class="row">
            <div class="col-lg-8 mx-auto">

                <div class="card shadow-lg">

                    <div class="card-header bg-info text-center">
                        <b><i>WORKPLACE LOGIN</i></b>
                    </div>

                    <div class="card-body">

                        <div class="row align-items-end">

                            <div class="col-lg-4">
                                <label><b><i>USERNAME</i></b></label>
                                <input type="text"
                                       name="txtname"
                                       class="form-control"
                                       placeholder="Enter username"/>
                            </div>

                            <div class="col-lg-4">
                                <label><b><i>PASSWORD</i></b></label>
                                <input type="password"
                                       name="txtpass"
                                       class="form-control"
                                       placeholder="Enter password"/>
                            </div>

                            <div class="col-lg-4">
                                <input type="button"
                                       value="Submit"
                                       class="btn btn-danger w-100"/>
                            </div>

                        </div>

                    </div>

                </div>

            </div>
        </div>

        <br><br>

        <!-- CONTACT DETAILS CARD -->

        <div class="row">

            <div class="col-lg-8 mx-auto">

                <div class="card shadow-lg">

                    <div class="card-header bg-info text-center">
                        <b><i>CONTACT DETAILS</i></b>
                    </div>

                    <div class="card-body">

                        <div class="row">

                            <div class="col-lg-6">

                                <label><b><i>NAME</i></b></label>
                                <input type="text"
                                       name="txtname"
                                       class="form-control"
                                       placeholder="ENTER NAME"/>

                                <br>

                                <label><b><i>PHONE</i></b></label>
                                <input type="text"
                                       name="txtphone"
                                       class="form-control"
                                       placeholder="ENTER PHONE"/>

                                <br>

                                <label><b><i>EMAIL</i></b></label>
                                <input type="text"
                                       name="txtemail"
                                       class="form-control"
                                       placeholder="ENTER EMAIL"/>

                            </div>

                            <div class="col-lg-6">

                                <label><b><i>DESCRIPTION</i></b></label>

                                <textarea name="txtdesc"
                                          class="form-control"
                                          placeholder="ENTER DESCRIPTION"
                                          style="height:220px;">
                                </textarea>

                            </div>

                        </div>

                        <br>
                         
                        <div class="row">
                            <div class="col-lg-12 text-center">
                                <input type="button"
                                       value="Submit"
                                       class="btn btn-primary px-5"/>
                            </div>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
