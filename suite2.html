<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Business Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

/* Walking Boy */
.boy{
    position:absolute;
    bottom:60px;
    left:-200px;
    font-size:90px;
    animation:walk 5s linear forwards;
}

@keyframes walk{
    0%{
        left:-200px;
    }
    80%{
        left:42%;
    }
    100%{
        left:42%;
    }
}

/* Login Form */
.login-box{
    width:350px;
    padding:35px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:20px;
    box-shadow:0 0 25px rgba(255,255,255,0.2);

    opacity:0;
    transform:translateY(100px) scale(0.7);
}

.show{
    animation:popup 1s ease forwards;
}

@keyframes popup{
    from{
        opacity:0;
        transform:translateY(100px) scale(0.7);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

h2{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #38bdf8;
}

p{
    color:white;
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="boy">🕴️</div>

<div class="login-box" id="loginBox">
    <h2>Login Form</h2>

    <div class="input-box">
        <input type="text" placeholder="Username">
    </div>

    <div class="input-box">
        <input type="password" placeholder="Password">
    </div>

    <button>Login</button>

    <p>Welcome Back</p>
</div>

<script>
setTimeout(()=>{
    document.getElementById("loginBox").classList.add("show");
},5000);
</script>

</body>
</html>
